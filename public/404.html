<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loading...</title>
    <script>
      // Redirect 404 requests to index.html for client-side routing
      const path = decodeURIComponent(window.location.pathname.slice(1)).split('/').slice(0, -1).join('/');
      if (path !== '' && !path.includes('.')) {
        window.history.replaceState(null, null, '/isola-verde/?' + path);
      } else {
        window.history.replaceState(null, null, '/isola-verde/');
      }
    </script>
  </head>
  <body>
  </body>
</html>
